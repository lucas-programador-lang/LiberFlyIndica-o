<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Indenização por Atraso de Voo</title>

<link rel="icon" href="logo.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(270deg,#020617,#020617,#021427,#020617);
background-size:400% 400%;
animation:bgmove 18s ease infinite;
color:white;
overflow-x:hidden;
padding-bottom:90px;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* PARTICLES */
#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

/* NAV */
.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
max-width:1200px;
margin:auto;
position:sticky;
top:0;
background:#020617;
z-index:1000;
}

.logo{
width:95px;
}

/* MENU */
.menu{
display:flex;
gap:16px;
align-items:center;
}

.menu a{
color:white;
text-decoration:none;
font-size:14px;
padding:8px 12px;
border-radius:8px;
display:flex;
gap:6px;
transition:0.3s;
}

.menu a:hover{
color:#22c55e;
background:rgba(34,197,94,0.12);
}

/* BOTÃO NAV */
.cta-nav{
background:#22c55e;
padding:10px 20px;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:600;
}

/* MENU MOBILE */
.menu-toggle{
display:none;
font-size:24px;
cursor:pointer;
}

/* HERO */
.hero{
text-align:center;
padding:100px 20px 70px;
max-width:900px;
margin:auto;
}

.hero h1{
font-size:48px;
}

.hero p{
color:#94a3b8;
font-size:19px;
}

.button-main{
display:inline-block;
margin-top:30px;
padding:18px 50px;
background:#22c55e;
border-radius:12px;
font-size:20px;
text-decoration:none;
}

/* GRID */
.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-top:30px;
}

/* MOBILE */
@media(max-width:768px){

.menu{
position:absolute;
top:70px;
left:0;
width:100%;
background:#020617;
flex-direction:column;
display:none;
padding:20px;
}

.menu.active{
display:flex;
}

.menu-toggle{
display:block;
}

.cta-nav{
display:none;
}

.hero h1{
font-size:32px;
}

.button-main{
width:100%;
}

}

</style>

</head>

<body>

<div id="particles-js"></div>

<!-- NAV -->
<div class="nav">

<img src="logo.png" class="logo">

<div class="menu" id="menu">
<a href="atraso-de-voo.html">Atraso</a>
<a href="cancelamento-de-voo.html">Cancelamento</a>
<a href="bagagem-extraviada.html">Bagagem</a>
<a href="overbooking.html">Overbooking</a>
<a href="direitos-do-passageiro.html">Direitos</a>
</div>

<i class="fa-solid fa-bars menu-toggle" onclick="toggleMenu()"></i>

<a class="cta-nav" href="#">Verificar Caso</a>

</div>

<!-- HERO -->
<div class="hero">

<h1>Teve problema com voo?</h1>

<p>Verifique gratuitamente se você pode receber indenização</p>

<a class="button-main" href="#">
✈️ Verificar Meu Caso
</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script>

/* PARTICLES (MANTIDO) */
particlesJS("particles-js", {
particles:{
number:{value:80},
color:{value:"#22c55e"},
line_linked:{enable:true}
}
});

/* MENU MOBILE */
function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

</script>

</body>
</html>
